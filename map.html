<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jans Live-Standort</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .info-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info" class="info-box">Lade Standort...</div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <script>
        // 1. Initialize the map
        const map = L.map('map').setView([0, 0], 2);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        let marker = null;

        // 2. Fetch data from your Cloudflare Worker
        async function updateLocation() {
            try {
                // Using your exact worker URL
                const response = await fetch('https://owntracks-backend.jkienast-at.workers.dev/location');
                const data = await response.json();

                if (data.lat && data.lon) {
                    const latLng = [data.lat, data.lon];
                    
                    // If marker doesn't exist, create it. Otherwise, move it.
                    if (!marker) {
                        marker = L.marker(latLng).addTo(map);
                        map.setView(latLng, 14); // Zoom in on first load
                    } else {
                        marker.setLatLng(latLng);
                    }

                    // Format the timestamp to local time
                    const lastUpdate = new Date(data.time * 1000).toLocaleString();
                    
                    // Update the popup and floating info box
                    const statusText = `<b>Akku:</b> ${data.battery}%<br><b>Zuletzt gesehen:</b> ${lastUpdate}`;
                    marker.bindPopup(statusText);
                    document.getElementById('info').innerHTML = statusText;
                }
            } catch (error) {
                console.error("Problem den Standort abzurufen:", error);
                document.getElementById('info').innerHTML = "Problem beim Laden der Standortdaten.";
            }
        }

        // 3. Run immediately, then check for updates every 30 seconds
        updateLocation();
        setInterval(updateLocation, 30000);
    </script>
</body>
</html>
