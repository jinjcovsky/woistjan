<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
    <a href="/" class="back-link">← Zurück zur Übersicht</a>
    
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%d.%m.%Y" }}</p>

    
    {% if page.lat and page.lon %}
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <div id="post-map" style="height: 300px; width: 100%; margin-bottom: 20px; border-radius: 8px;"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const lat = {{ page.lat }};
        const lon = {{ page.lon }};
        const postMap = L.map('post-map').setView([lat, lon], 14);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(postMap);
        
        L.marker([lat, lon]).addTo(postMap)
            .bindPopup("<b>{{ page.title | escape }}</b>")
            .openPopup();
    </script>
    {% endif %}

    <div>
        {{ content }}
    </div>
</body>
</html>
